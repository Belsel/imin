spring:
  datasource:
    url: jdbc:h2:mem:imin-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: openid,profile,email

jwt:
  secret: test-only-secret-key-not-for-production-use-only

resend:
  api-key: ""

email:
  from-address: no-reply@example.com

ors:
  api-key: ""

app:
  frontend-url: http://localhost:5173
